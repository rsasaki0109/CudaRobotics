name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: "12.0.0"
          method: network

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential libeigen3-dev libopencv-dev

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      # GPU tests (label "gpu") require NVIDIA GPU and cannot run in CI

      - name: Run Python tests
        run: cd build && ctest --output-on-failure --label-regex python -j$(nproc)

      - name: Run CPU tests
        run: cd build && ctest --output-on-failure --label-regex cpu -j$(nproc)
